{% extends "base.html" %} {% block title %}Products{% endblock %} {% block
content %}
<h1>Products</h1>

<div class="row mb-3">
  <div class="col-12 d-flex justify-content-between align-items-center">
    <input
      type="text"
      id="search"
      class="form-control w-50"
      placeholder="Search products..."
    />
    {% if user and user.role and user.role.name == 'admin' %}
    <button id="show-create" class="btn btn-primary">Create Product</button>
    {% endif %}
  </div>
  <div class="col-12 mt-2" id="admin-form-container" style="display: none">
    <form id="product-form" class="row g-2">
      <input type="hidden" id="product-id" />
      <div class="col-md-4">
        <input id="p-name" class="form-control" placeholder="Name" required />
      </div>
      <div class="col-md-4">
        <input id="p-sku" class="form-control" placeholder="SKU" required />
      </div>
      <div class="col-md-4">
        <input
          id="p-price"
          type="number"
          step="0.01"
          class="form-control"
          placeholder="Price"
          required
        />
      </div>
      <div class="col-md-4">
        <input
          id="p-quantity"
          type="number"
          class="form-control"
          placeholder="Quantity"
          required
        />
      </div>
      <div class="col-md-8">
        <input
          id="p-description"
          class="form-control"
          placeholder="Description"
        />
      </div>
      <div class="col-12">
        <button class="btn btn-success" id="save-product">Save</button>
        <button id="cancel-product" class="btn btn-secondary" type="button">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>

<div id="product-list" class="row">
  <!-- Products will be loaded via JavaScript -->
</div>

<script>
  function apiFetch(url, opts={}){
      opts.credentials = opts.credentials || 'same-origin';
      if(!opts.headers) opts.headers = {};
      if(opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)){
          opts.headers['Content-Type'] = 'application/json';
          opts.body = JSON.stringify(opts.body);
      }
      return fetch(url, opts).then(async res => {
          if(!res.ok){
              const txt = await res.text();
              throw new Error(txt || res.statusText);
          }
          return res.status === 204 ? null : res.json();
      });
  }

  function renderProducts(data){
      const container = document.getElementById('product-list');
      const IS_ADMIN = {{ 'true' if user and user.role and user.role.name == 'admin' else 'false' }};
      container.innerHTML = data.map(p => {
          return `
          <div class="col-md-4 mb-3">
              <div class="card h-100">
                  <div class="card-body d-flex flex-column">
                      <h5 class="card-title">${p.name}</h5>
                      <p class="card-text">${p.description || ''}</p>
                      <p class="card-text"><strong>SKU:</strong> ${p.sku}</p>
                      <p class="card-text"><strong>Price:</strong> $${p.selling_price}</p>
                      <p class="card-text"><strong>Stock:</strong> ${p.quantity}</p>
                      <div class="mt-auto d-flex justify-content-between align-items-center">
                          <div>
                              <button class="btn btn-sm btn-outline-primary" onclick="addToCart(${p.id})">Add to cart</button>
                          </div>
                          ${ IS_ADMIN ? `<div class="btn-group">
                              <button class="btn btn-sm btn-warning" onclick="editProduct(${p.id}, '${escapeJs(p.name)}', '${p.sku}', ${p.selling_price}, ${p.quantity}, '${escapeJs(p.description||'')}')">Edit</button>
                              <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                          </div>` : '' }
                      </div>
                  </div>
              </div>
          </div>
          `;
      }).join('');
  }

  function escapeJs(str){
      return String(str).replace(/`/g,'\\`').replace(/\\/g,'\\\\').replace(/\$/g,'\\$');
  }

  function loadProducts(query = '') {
      const url = query ? `/api/products/search?q=${encodeURIComponent(query)}` : '/api/products/';
      apiFetch(url).then(data => renderProducts(data)).catch(err=>console.error(err));
  }

  function addToCart(productId, qty=1){
      apiFetch(`/api/carts/add?product_id=${productId}&quantity=${qty}`, {method:'POST'})
      .then(r=>{
          alert('Added to cart');
      }).catch(e=>{alert('Error adding to cart');console.error(e)});
  }

  document.getElementById('search').addEventListener('input', function(e) {
      loadProducts(e.target.value);
  });

  // Admin form toggles and submit
  const showCreate = document.getElementById('show-create');
  if(showCreate){
      const formContainer = document.getElementById('admin-form-container');
      const form = document.getElementById('product-form');
      const cancel = document.getElementById('cancel-product');
      showCreate.addEventListener('click', ()=>{ formContainer.style.display='block'; document.getElementById('product-id').value=''; });
      cancel.addEventListener('click', ()=>{ formContainer.style.display='none'; form.reset(); });
      form.addEventListener('submit', function(ev){
          ev.preventDefault();
          const id = document.getElementById('product-id').value;
          const payload = {
              name: document.getElementById('p-name').value,
              sku: document.getElementById('p-sku').value,
              selling_price: parseFloat(document.getElementById('p-price').value),
              quantity: parseInt(document.getElementById('p-quantity').value,10),
              description: document.getElementById('p-description').value
          };
          const method = id ? 'PUT' : 'POST';
          const url = id ? `/api/products/${id}` : '/api/products/';
          apiFetch(url, {method, body: payload}).then(resp=>{ alert('Saved'); form.reset(); formContainer.style.display='none'; loadProducts(); }).catch(e=>{alert('Error');console.error(e)});
      });
  }

  loadProducts();
</script>
<script>
  function editProduct(id, name, sku, price, quantity, description) {
    document.getElementById("product-id").value = id;
    document.getElementById("p-name").value = name;
    document.getElementById("p-sku").value = sku;
    document.getElementById("p-price").value = price;
    document.getElementById("p-quantity").value = quantity;
    document.getElementById("p-description").value = description;
    document.getElementById("admin-form-container").style.display = "block";
  }

  function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;
    apiFetch(`/api/products/${id}`, { method: "DELETE" })
      .then(() => {
        alert("Deleted");
        loadProducts();
      })
      .catch((e) => {
        alert("Delete failed");
        console.error(e);
      });
  }
</script>
{% endblock %}
